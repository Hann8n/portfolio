<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="stylesheet" href="style.css">
  <title>Gym Tracker Ads Admin</title>
</head>
<body>
  <main class="admin-main">
    <article class="admin-card">
      <h1 class="admin-title">Gym Tracker Ads</h1>
      <p class="admin-subtitle">Manage sponsor ad config for VT Gym Tracker</p>

      <section class="admin-section">
        <h2>API Key</h2>
        <p class="admin-hint">Required for saving. Stored in sessionStorage for this tab.</p>
        <input type="password" id="apiKey" placeholder="Enter ADMIN_API_KEY" class="admin-input" autocomplete="off">
        <button type="button" id="saveKey" class="admin-btn">Save key for session</button>
      </section>

      <section class="admin-section">
        <h2>Schedule</h2>
        <div class="admin-row">
          <button type="button" id="fetchScheduleBtn" class="admin-btn">Fetch schedule</button>
          <span id="fetchStatus" class="admin-status"></span>
        </div>
        <div id="scheduleList" class="admin-schedule-list" hidden>
          <label class="admin-label">Edit ad</label>
          <select id="adSelector" class="admin-input">
            <option value="">— New ad —</option>
          </select>
        </div>
      </section>

      <form id="adForm" class="admin-form">
        <section class="admin-section">
          <h2>Ad Config</h2>
          <label class="admin-label">ID (unique, e.g. sponsor-2025-q1)</label>
          <input type="text" id="id" name="id" class="admin-input" required>

          <label class="admin-label">Tier</label>
          <select id="tier" name="tier" class="admin-input">
            <option value="text">text</option>
            <option value="banner">banner</option>
            <option value="feature">feature</option>
          </select>

          <label class="admin-label">Active</label>
          <input type="checkbox" id="active" name="active" class="admin-checkbox">

          <label class="admin-label">Sponsor</label>
          <input type="text" id="sponsor" name="sponsor" class="admin-input" required>

          <label class="admin-label">Headline</label>
          <input type="text" id="headline" name="headline" class="admin-input" required>

          <label class="admin-label">Subline (optional)</label>
          <input type="text" id="subline" name="subline" class="admin-input">

          <label class="admin-label">CTA</label>
          <input type="text" id="cta" name="cta" class="admin-input" required>

          <label class="admin-label">Destination URL (HTTPS)</label>
          <input type="url" id="destination_url" name="destination_url" class="admin-input" required placeholder="https://">

          <label class="admin-label">Image URL (required for banner/feature)</label>
          <input type="url" id="image_url" name="image_url" class="admin-input" placeholder="https://">

          <label class="admin-label">Logo URL (optional)</label>
          <input type="url" id="logo_url" name="logo_url" class="admin-input" placeholder="https://">

          <label class="admin-label">Placement (default: home_feed)</label>
          <input type="text" id="placement" name="placement" class="admin-input" value="home_feed">

          <label class="admin-label">Creative version (optional)</label>
          <input type="text" id="creative_version" name="creative_version" class="admin-input">

          <label class="admin-label">Start at (optional)</label>
          <input type="datetime-local" id="start_at" name="start_at" class="admin-input">

          <label class="admin-label">End at (optional)</label>
          <input type="datetime-local" id="end_at" name="end_at" class="admin-input">
        </section>

        <div class="admin-form-actions">
          <button type="submit" id="saveBtn" class="admin-btn admin-btn-primary">Save config</button>
          <span id="saveStatus" class="admin-status"></span>
        </div>
      </form>

      <p class="admin-footer"><a href="index.html">Back to jackhannon.net</a></p>
    </article>
  </main>

  <script>
    const API_URL = "https://gymtracker.jackhannon.net/api/ads";
    const KEY_STORAGE = "gymtracker_ads_api_key";

    const apiKeyInput = document.getElementById("apiKey");
    const saveKeyBtn = document.getElementById("saveKey");
    const fetchScheduleBtn = document.getElementById("fetchScheduleBtn");
    const fetchStatus = document.getElementById("fetchStatus");
    const scheduleList = document.getElementById("scheduleList");
    const adSelector = document.getElementById("adSelector");
    const saveBtn = document.getElementById("saveBtn");
    const saveStatus = document.getElementById("saveStatus");
    const form = document.getElementById("adForm");

    let scheduledAds = [];

    if (sessionStorage.getItem(KEY_STORAGE)) {
      apiKeyInput.placeholder = "•••••••••••• (saved)";
    }

    saveKeyBtn.addEventListener("click", () => {
      const key = apiKeyInput.value.trim();
      if (key) {
        sessionStorage.setItem(KEY_STORAGE, key);
        apiKeyInput.value = "";
        apiKeyInput.placeholder = "•••••••••••• (saved)";
      }
    });

    function getApiKey() {
      return sessionStorage.getItem(KEY_STORAGE);
    }

    function setStatus(el, msg, ok) {
      el.textContent = msg;
      el.className = "admin-status " + (ok ? "admin-status-ok" : "admin-status-err");
    }

    function adStatus(ad) {
      const now = new Date();
      const start = ad.start_at ? new Date(ad.start_at) : null;
      const end = ad.end_at ? new Date(ad.end_at) : null;
      if (!ad.active) return "paused";
      if (start && now < start) return "scheduled";
      if (end && now > end) return "ended";
      return "live";
    }

    function formatAdOption(ad) {
      const status = adStatus(ad);
      const label = status === "live" ? "●" : status === "scheduled" ? "○" : status === "ended" ? "—" : "‖";
      const startStr = ad.start_at ? new Date(ad.start_at).toLocaleDateString() : "…";
      const endStr = ad.end_at ? new Date(ad.end_at).toLocaleDateString() : "…";
      const range = ad.start_at || ad.end_at ? ` (${startStr}–${endStr})` : "";
      return `${label} ${ad.id}${range} [${status}]`;
    }

    fetchScheduleBtn.addEventListener("click", async () => {
      const key = getApiKey();
      if (!key) {
        setStatus(fetchStatus, "Set API key first", false);
        return;
      }
      setStatus(fetchStatus, "Fetching…", true);
      try {
        const res = await fetch(API_URL + "?schedule=1", {
          headers: { "X-API-Key": key },
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(fetchStatus, data.error || res.statusText, false);
          return;
        }
        scheduledAds = data.ads || [];
        adSelector.innerHTML = '<option value="">— New ad —</option>';
        scheduledAds.forEach((ad, i) => {
          const opt = document.createElement("option");
          opt.value = String(i);
          opt.textContent = formatAdOption(ad);
          adSelector.appendChild(opt);
        });
        scheduleList.hidden = scheduledAds.length === 0;
        if (scheduledAds.length > 0) {
          adSelector.hidden = false;
          adSelector.value = "0";
          populateForm(scheduledAds[0]);
        } else {
          clearForm();
        }
        setStatus(fetchStatus, `Loaded ${scheduledAds.length} ad(s)`, true);
      } catch (err) {
        setStatus(fetchStatus, err.message || "Network error", false);
      }
    });

    adSelector.addEventListener("change", () => {
      const val = adSelector.value;
      if (val === "") {
        clearForm();
      } else {
        const ad = scheduledAds[parseInt(val, 10)];
        if (ad) populateForm(ad);
      }
    });

    function clearForm() {
      document.getElementById("id").value = "";
      document.getElementById("tier").value = "banner";
      document.getElementById("active").checked = true;
      document.getElementById("sponsor").value = "";
      document.getElementById("headline").value = "";
      document.getElementById("subline").value = "";
      document.getElementById("cta").value = "";
      document.getElementById("destination_url").value = "";
      document.getElementById("image_url").value = "";
      document.getElementById("logo_url").value = "";
      document.getElementById("placement").value = "home_feed";
      document.getElementById("creative_version").value = "";
      document.getElementById("start_at").value = "";
      document.getElementById("end_at").value = "";
    }

    function isoToDatetimeLocal(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const pad = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function datetimeLocalToIso(value) {
      if (!value) return undefined;
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? undefined : d.toISOString();
    }

    function populateForm(data) {
      document.getElementById("id").value = data.id || "";
      document.getElementById("tier").value = (data.tier || "banner").toLowerCase();
      document.getElementById("active").checked = !!data.active;
      document.getElementById("sponsor").value = data.sponsor || "";
      document.getElementById("headline").value = data.headline || "";
      document.getElementById("subline").value = data.subline || "";
      document.getElementById("cta").value = data.cta || "";
      document.getElementById("destination_url").value = data.destination_url || "";
      document.getElementById("image_url").value = data.image_url || "";
      document.getElementById("logo_url").value = data.logo_url || "";
      document.getElementById("placement").value = data.placement || "home_feed";
      document.getElementById("creative_version").value = data.creative_version || "";
      document.getElementById("start_at").value = isoToDatetimeLocal(data.start_at);
      document.getElementById("end_at").value = isoToDatetimeLocal(data.end_at);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const key = getApiKey();
      if (!key) {
        setStatus(saveStatus, "Set API key first", false);
        return;
      }

      const tier = document.getElementById("tier").value;
      const payload = {
        id: document.getElementById("id").value.trim(),
        tier,
        active: document.getElementById("active").checked,
        sponsor: document.getElementById("sponsor").value.trim(),
        headline: document.getElementById("headline").value.trim(),
        subline: document.getElementById("subline").value.trim() || null,
        cta: document.getElementById("cta").value.trim(),
        destination_url: document.getElementById("destination_url").value.trim(),
        image_url: document.getElementById("image_url").value.trim() || null,
        logo_url: document.getElementById("logo_url").value.trim() || null,
        placement: document.getElementById("placement").value.trim() || "home_feed",
        creative_version: document.getElementById("creative_version").value.trim() || "",
        start_at: datetimeLocalToIso(document.getElementById("start_at").value.trim()),
        end_at: datetimeLocalToIso(document.getElementById("end_at").value.trim()),
      };

      if ((tier === "banner" || tier === "feature") && !payload.image_url) {
        setStatus(saveStatus, "Banner/feature tier requires image_url", false);
        return;
      }

      setStatus(saveStatus, "Saving…", true);
      try {
        const res = await fetch(API_URL, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": key,
          },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus(saveStatus, data.error || res.statusText, false);
          return;
        }
        setStatus(saveStatus, "Saved", true);
        if (scheduledAds.length > 0) fetchScheduleBtn.click();
      } catch (err) {
        setStatus(saveStatus, err.message || "Network error", false);
      }
    });
  </script>

  <style>
    .admin-main { min-height: 100dvh; padding: 2rem; display: flex; justify-content: center; align-items: flex-start; }
    .admin-card { max-width: 32rem; width: 100%; display: flex; flex-direction: column; gap: 1.5rem; }
    .admin-title { font-size: 1.5rem; font-weight: 600; }
    .admin-subtitle { color: var(--color-text-muted); font-size: 0.9rem; }
    .admin-section { display: flex; flex-direction: column; gap: 0.5rem; }
    .admin-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .admin-label { font-size: 0.875rem; color: var(--color-text-muted); }
    .admin-input { padding: 0.5rem 0.75rem; border: 1px solid var(--color-border); border-radius: 0.5rem; background: var(--color-bg); color: var(--color-text); font: inherit; }
    .admin-input:focus { outline: 2px solid var(--color-vt-maroon); outline-offset: 2px; }
    .admin-checkbox { width: 1.25rem; height: 1.25rem; }
    .admin-btn { padding: 0.5rem 1rem; border: 1px solid var(--color-border); border-radius: 0.5rem; background: var(--color-bg); color: var(--color-text); font: inherit; cursor: pointer; }
    .admin-btn:hover { background: var(--color-border); }
    .admin-btn-primary { background: var(--color-vt-maroon); color: white; border-color: var(--color-vt-maroon); }
    .admin-btn-primary:hover { opacity: 0.9; }
    .admin-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .admin-form-actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border); }
    .admin-status { font-size: 0.875rem; color: var(--color-text-muted); }
    .admin-status-ok { color: oklch(50% 0.15 145); }
    .admin-status-err { color: oklch(55% 0.2 25); }
    .admin-hint { font-size: 0.8rem; color: var(--color-text-muted); }
    .admin-schedule-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .admin-footer { margin-top: 1rem; font-size: 0.875rem; }
    .admin-footer a { text-decoration: underline; }
  </style>
</body>
</html>
